<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220" style="background:#0d1117;border-radius:12px;font-family:monospace">

  <defs>
    <!-- Glow filter for dots -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Box gradient -->
    <linearGradient id="boxgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <!-- Active box gradient -->
    <linearGradient id="activegrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a7a"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <!-- Arrow path definitions (for animateMotion) -->
    <!-- Arrow 1: API -> Extract  (x: 145 -> 195) -->
    <path id="p1" d="M 148,110 L 192,110" fill="none"/>
    <!-- Arrow 2: Extract -> Transform (x: 305 -> 355) -->
    <path id="p2" d="M 308,110 L 352,110" fill="none"/>
    <!-- Arrow 3: Transform -> Load (x: 465 -> 515) -->
    <path id="p3" d="M 468,110 L 512,110" fill="none"/>
    <!-- Arrow 4: Load -> Postgres (x: 625 -> 675) -->
    <path id="p4" d="M 628,110 L 672,110" fill="none"/>
  </defs>

  <!-- ── TITLE ──────────────────────────────────────────────────────────── -->
  <text x="480" y="28" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold" letter-spacing="2">WEATHER PIPELINE - DATA FLOW</text>

  <!-- ── STAGE BOXES ───────────────────────────────────────────────────── -->

  <!-- Box 1: OpenWeatherMap API -->
  <rect x="10" y="72" width="135" height="76" rx="8" fill="url(#boxgrad)" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="77" y="98" text-anchor="middle" fill="#58a6ff" font-size="18">🌐</text>
  <text x="77" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">OpenWeatherMap</text>
  <text x="77" y="130" text-anchor="middle" fill="#8b949e" font-size="9">REST API</text>
  <text x="77" y="144" text-anchor="middle" fill="#3fb950" font-size="8">28 locations</text>

  <!-- Box 2: Extract -->
  <rect x="195" y="72" width="110" height="76" rx="8" fill="url(#boxgrad)" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="250" y="98" text-anchor="middle" fill="#bc8cff" font-size="18">📥</text>
  <text x="250" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">EXTRACT</text>
  <text x="250" y="130" text-anchor="middle" fill="#8b949e" font-size="9">WeatherAPIClient</text>
  <text x="250" y="144" text-anchor="middle" fill="#8b949e" font-size="8">lat/lon lookup</text>

  <!-- Box 3: Transform -->
  <rect x="355" y="72" width="110" height="76" rx="8" fill="url(#boxgrad)" stroke="#ffa657" stroke-width="1.5"/>
  <text x="410" y="98" text-anchor="middle" fill="#ffa657" font-size="18">🔄</text>
  <text x="410" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">TRANSFORM</text>
  <text x="410" y="130" text-anchor="middle" fill="#8b949e" font-size="9">Validate + Enrich</text>
  <text x="410" y="144" text-anchor="middle" fill="#8b949e" font-size="8">season, category</text>

  <!-- Box 4: Load -->
  <rect x="515" y="72" width="110" height="76" rx="8" fill="url(#boxgrad)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="570" y="98" text-anchor="middle" fill="#3fb950" font-size="18">💾</text>
  <text x="570" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">LOAD</text>
  <text x="570" y="130" text-anchor="middle" fill="#8b949e" font-size="9">WeatherDBManager</text>
  <text x="570" y="144" text-anchor="middle" fill="#8b949e" font-size="8">batch insert</text>

  <!-- Box 5: PostgreSQL -->
  <rect x="675" y="72" width="115" height="76" rx="8" fill="url(#boxgrad)" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="732" y="98" text-anchor="middle" fill="#58a6ff" font-size="18">🗄️</text>
  <text x="732" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">PostgreSQL</text>
  <text x="732" y="130" text-anchor="middle" fill="#8b949e" font-size="9">weather_records</text>
  <text x="732" y="144" text-anchor="middle" fill="#3fb950" font-size="8">queryable history</text>

  <!-- Box 6: Airflow (below, orchestrating) -->
  <rect x="230" y="182" width="340" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" fill="#8b949e" font-size="10">⚙️  Apache Airflow 2.7  -  schedules every hour  -  retries on failure</text>

  <!-- ── ARROWS (static lines) ─────────────────────────────────────────── -->

  <!-- Arrow 1 line -->
  <line x1="148" y1="110" x2="188" y2="110" stroke="#30363d" stroke-width="2"/>
  <polygon points="188,106 196,110 188,114" fill="#30363d"/>

  <!-- Arrow 2 line -->
  <line x1="308" y1="110" x2="348" y2="110" stroke="#30363d" stroke-width="2"/>
  <polygon points="348,106 356,110 348,114" fill="#30363d"/>

  <!-- Arrow 3 line -->
  <line x1="468" y1="110" x2="508" y2="110" stroke="#30363d" stroke-width="2"/>
  <polygon points="508,106 516,110 508,114" fill="#30363d"/>

  <!-- Arrow 4 line -->
  <line x1="628" y1="110" x2="668" y2="110" stroke="#30363d" stroke-width="2"/>
  <polygon points="668,106 676,110 668,114" fill="#30363d"/>

  <!-- Vertical dotted lines from Airflow box up to arrow midpoints -->
  <line x1="285" y1="182" x2="170" y2="120" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="182" x2="400" y2="148" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="515" y1="182" x2="570" y2="148" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── DATA LABELS on arrows ─────────────────────────────────────────── -->
  <text x="170" y="103" text-anchor="middle" fill="#8b949e" font-size="7">JSON</text>
  <text x="330" y="103" text-anchor="middle" fill="#8b949e" font-size="7">List[Dict]</text>
  <text x="490" y="103" text-anchor="middle" fill="#8b949e" font-size="7">DataFrame</text>
  <text x="650" y="103" text-anchor="middle" fill="#8b949e" font-size="7">rows</text>

  <!-- ── ANIMATED DOTS (SMIL animateMotion) ────────────────────────────── -->

  <!-- Arrow 1 dots: API -> Extract (cyan) -->
  <circle r="4" fill="#79c0ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0s"><mpath href="#p1"/></animateMotion>
  </circle>
  <circle r="4" fill="#79c0ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.45s"><mpath href="#p1"/></animateMotion>
  </circle>
  <circle r="4" fill="#79c0ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.9s"><mpath href="#p1"/></animateMotion>
  </circle>

  <!-- Arrow 2 dots: Extract -> Transform (purple) -->
  <circle r="4" fill="#d2a8ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.2s"><mpath href="#p2"/></animateMotion>
  </circle>
  <circle r="4" fill="#d2a8ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.65s"><mpath href="#p2"/></animateMotion>
  </circle>
  <circle r="4" fill="#d2a8ff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="1.1s"><mpath href="#p2"/></animateMotion>
  </circle>

  <!-- Arrow 3 dots: Transform -> Load (orange) -->
  <circle r="4" fill="#ffa657" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.4s"><mpath href="#p3"/></animateMotion>
  </circle>
  <circle r="4" fill="#ffa657" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.85s"><mpath href="#p3"/></animateMotion>
  </circle>
  <circle r="4" fill="#ffa657" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="1.3s"><mpath href="#p3"/></animateMotion>
  </circle>

  <!-- Arrow 4 dots: Load -> PostgreSQL (green) -->
  <circle r="4" fill="#3fb950" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.6s"><mpath href="#p4"/></animateMotion>
  </circle>
  <circle r="4" fill="#3fb950" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="1.05s"><mpath href="#p4"/></animateMotion>
  </circle>
  <circle r="4" fill="#3fb950" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="1.5s"><mpath href="#p4"/></animateMotion>
  </circle>

</svg>
